<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta - La Mesa Dorada</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f59e0b',
                        brand: 'var(--brand-color, #f59e0b)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            color: #0f172a;
            margin: 0;
            overflow: hidden;
        }

        .input-premium {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            background: #fff;
            transition: all 0.2s;
            outline: none;
        }

        .input-premium:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-premium {
            background-color: #0f172a;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .btn-premium:hover {
            background-color: #1e293b;
        }

        .btn-premium:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-outline {
            background-color: white;
            color: #0f172a;
            border: 1px solid #e2e8f0;
        }

        .btn-outline:hover {
            background-color: #f8fafc;
        }

        /* Cart scrollbar */
        .cart-scroll::-webkit-scrollbar { width: 6px; }
        .cart-scroll::-webkit-scrollbar-track { background: transparent; }
        .cart-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .cart-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Toast overrides */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0f172a;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        #toast.show { transform: translateY(0); }
    </style>
</head>
<body class="flex h-screen w-full">

    <!-- Header Fijo para móviles (Opcional, pero mantendremos layout iPad flex-row) -->
    <div class="flex-1 flex flex-col h-full bg-slate-50 relative z-10">
        
        <!-- Navbar Superior -->
        <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded bg-amber-500 text-white flex items-center justify-center brand-bg">
                    <i data-lucide="store" class="w-4 h-4"></i>
                </div>
                <h1 class="font-bold text-slate-900 text-lg">Toma de Pedido</h1>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm font-medium text-slate-600 bg-slate-100 px-3 py-1 rounded-full flex items-center gap-2">
                    <i data-lucide="user" class="w-4 h-4"></i> <span id="lbl-user">Mesero</span>
                </span>
                <button onclick="logout()" class="p-2 text-red-500 hover:bg-red-50 rounded-full transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Area de Contenido (Mesas y Menú) -->
        <main class="flex-1 overflow-y-auto p-6">
            
            <!-- Selector de Mesas -->
            <section class="mb-8">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                        <i data-lucide="layout-grid" class="w-5 h-5 text-slate-400"></i> Seleccionar Mesa
                    </h2>
                </div>
                <input type="hidden" id="mesa" value="">
                <div id="tables-grid" class="flex gap-3 overflow-x-auto pb-4 cart-scroll snap-x">
                    <div class="animate-pulse flex gap-3">
                        <div class="w-24 h-16 bg-slate-200 rounded-xl"></div>
                        <div class="w-24 h-16 bg-slate-200 rounded-xl"></div>
                        <div class="w-24 h-16 bg-slate-200 rounded-xl"></div>
                    </div>
                </div>
            </section>

            <!-- Menú de Productos -->
            <section>
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                        <i data-lucide="coffee" class="w-5 h-5 text-slate-400"></i> Menú
                    </h2>
                    <div class="relative w-64">
                        <i data-lucide="search" class="absolute left-3 top-3 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="menu-search" class="input-premium pl-9 py-2 text-sm" placeholder="Buscar producto..." onkeyup="filterMenu()">
                    </div>
                </div>
                
                <div id="menu-buttons" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 pb-20">
                    <!-- Products inject here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Sidebar Carrito (Derecha) -->
    <aside class="w-80 md:w-96 bg-white border-l border-slate-200 flex flex-col h-full shrink-0 shadow-xl z-20">
        
        <div class="p-5 border-b border-slate-100 bg-slate-50 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i>
            </div>
            <div>
                <h2 class="font-bold text-slate-900">Orden Actual</h2>
                <p class="text-xs text-slate-500" id="lbl-mesa-selected">Ninguna mesa seleccionada</p>
            </div>
        </div>

        <div id="cart-items" class="flex-1 overflow-y-auto p-4 cart-scroll space-y-3 bg-slate-50">
            <div class="flex flex-col items-center justify-center h-full text-slate-400 gap-3 opacity-50">
                <i data-lucide="shopping-bag" class="w-12 h-12"></i>
                <p>El carrito está vacío</p>
            </div>
        </div>

        <div class="p-5 bg-white border-t border-slate-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            
            <div class="space-y-2 mb-4 text-sm font-medium text-slate-600">
                <div class="flex justify-between">
                    <span>Subtotal</span>
                    <span id="cart-subtotal" class="text-slate-900">$0</span>
                </div>
                
                <div class="pt-2">
                    <span class="block mb-2 text-xs uppercase tracking-wider">Propina Sugerida</span>
                    <div class="flex gap-2">
                        <button class="flex-1 py-1.5 border border-slate-200 rounded text-slate-600 hover:bg-slate-50 transition-colors" onclick="updateTip(0)">0%</button>
                        <button class="flex-1 py-1.5 border border-amber-200 bg-amber-50 text-amber-700 rounded font-semibold hover:bg-amber-100 transition-colors" onclick="updateTip(10)">10%</button>
                        <button class="flex-1 py-1.5 border border-slate-200 rounded text-slate-600 hover:bg-slate-50 transition-colors" onclick="updateTip(15)">15%</button>
                    </div>
                </div>

                <div class="flex justify-between items-center text-slate-500 pt-2">
                    <span>Propina Calculada</span>
                    <span id="cart-tip" class="text-slate-900">$0</span>
                </div>
            </div>

            <div class="flex justify-between items-end mb-5 pt-4 border-t border-slate-100">
                <span class="font-semibold text-slate-900 text-lg">Total a Pagar</span>
                <span id="cart-total" class="font-bold text-3xl text-amber-500">$0</span>
            </div>

            <button id="btn-send" class="btn-premium w-full bg-slate-900 hover:bg-slate-800 text-lg py-4 shadow-xl shadow-slate-900/20" onclick="openPaymentModal()" disabled>
                Cobrar y Enviar <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </div>
    </aside>

    <!-- Modal Calculadora -->
    <div id="payment-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
            <div class="bg-slate-50 p-6 text-center border-b border-slate-100">
                <h3 class="font-bold text-slate-900 mb-1">Cerrar Cuenta</h3>
                <p class="text-sm text-slate-500">Mesa: <span id="pay-mesa-lbl" class="font-semibold text-slate-700"></span></p>
                <div id="payment-total-display" class="text-4xl font-black text-amber-500 mt-4">$0</div>
            </div>
            <div class="p-6">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Efectivo Recibido</label>
                <div class="relative mb-6">
                    <span class="absolute left-4 top-4 text-slate-400 font-bold">$</span>
                    <input type="number" id="cash-received" class="w-full bg-slate-100 border-2 border-slate-200 rounded-xl px-4 py-4 pl-8 text-2xl font-bold text-slate-900 focus:outline-none focus:border-amber-500 focus:bg-white transition-colors" placeholder="0" onkeyup="calculateChange()">
                </div>
                
                <div class="flex justify-between items-center bg-emerald-50 border border-emerald-100 rounded-xl p-4 mb-6">
                    <span class="font-semibold text-emerald-800">Cambio a Devolver</span>
                    <span id="change-display" class="text-2xl font-bold text-emerald-600">$0</span>
                </div>

                <div class="flex gap-3">
                    <button class="btn-premium btn-outline flex-1" onclick="closePaymentModal()">Cancelar</button>
                    <button class="btn-premium bg-amber-500 hover:bg-amber-600 text-slate-900 flex-1 shadow-lg shadow-amber-500/30" onclick="sendOrder()">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Factura -->
    <div id="invoice-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-xs overflow-hidden">
            <div id="invoice-content" class="bg-white"></div>
            <div class="p-4 bg-slate-50 flex gap-3 border-t border-slate-200">
                <button class="btn-premium btn-outline flex-1 text-sm" onclick="closeInvoice()">Cerrar</button>
                <button class="btn-premium flex-1 text-sm bg-slate-900" onclick="printInvoice()">
                    <i data-lucide="printer" class="w-4 h-4"></i> Imprimir
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <i data-lucide="info" class="w-5 h-5"></i> <span id="toast-msg"></span>
    </div>

    <!-- Script Injection -->
    <script>
        const originalShowToast = window.showToast;
    </script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();

        // Brand color
        const color = localStorage.getItem('temp_brand_color') || '#f59e0b';
        document.documentElement.style.setProperty('--brand-color', color);
        const brandBg = document.querySelector('.brand-bg');
        if(brandBg) brandBg.style.backgroundColor = color;

        document.getElementById('lbl-user').innerText = localStorage.getItem("session_user_name") || "Mesero";

        window.showToast = function(message) {
            const toast = document.getElementById("toast");
            const msg = document.getElementById("toast-msg");
            if (!toast) return;
            msg.innerText = message;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 3000);
        };

        // Redefine select table logic for Tailwind UI
        window.selectTable = function(tableName) {
            document.getElementById('mesa').value = tableName;
            document.getElementById('lbl-mesa-selected').innerText = "Mesa: " + tableName;
            document.getElementById('pay-mesa-lbl').innerText = tableName;
            
            document.querySelectorAll('.table-btn-tw').forEach(btn => {
                btn.classList.remove('ring-4', 'ring-blue-500', 'bg-blue-50');
                btn.classList.add('border-slate-200');
            });
            const sel = document.getElementById(`table-btn-${tableName}`);
            if(sel) {
                sel.classList.remove('border-slate-200');
                sel.classList.add('ring-4', 'ring-blue-500', 'bg-blue-50');
            }
        };

        // Patch table grid render
        window.loadTablesGrid = async function() {
            const container = document.getElementById('tables-grid');
            if(!container) return;
            try {
                let res = await apiFetch(`${API_BASE}/tables/${RESTAURANT_ID}/status`);
                let tables = [];
                if (!res.ok) {
                    res = await apiFetch(`${API_BASE}/tables/${RESTAURANT_ID}`);
                    tables = await res.json();
                    tables = tables.map(t => ({ ...t, is_occupied: false }));
                } else {
                    tables = await res.json();
                }

                container.innerHTML = "";
                if(tables.length === 0) container.innerHTML = "<p class='text-slate-500'>No hay mesas</p>";
                
                tables.forEach(t => {
                    const isOccupied = t.is_occupied;
                    const bgClass = isOccupied ? 'bg-amber-50 border-amber-200' : 'bg-white border-slate-200';
                    const iconColor = isOccupied ? 'text-amber-500' : 'text-slate-400';
                    const statusText = isOccupied ? 'Ocupada' : 'Libre';
                    
                    container.innerHTML += `
                        <button class="table-btn-tw shrink-0 w-32 h-24 rounded-xl border ${bgClass} flex flex-col items-center justify-center gap-2 hover:shadow-md transition-all snap-center" id="table-btn-${t.name}" onclick="selectTable('${t.name}')">
                            <i data-lucide="coffee" class="w-6 h-6 ${iconColor}"></i>
                            <div class="text-center">
                                <span class="block font-bold text-slate-900">${t.name}</span>
                                <span class="block text-xs font-medium ${isOccupied ? 'text-amber-600' : 'text-slate-500'}">${statusText}</span>
                            </div>
                        </button>
                    `;
                });
                lucide.createIcons();
            } catch(e) {}
        };

        // Patch menu grid render
        window.loadMenuWaiter = async function() {
            const container = document.getElementById('menu-buttons');
            if(!container) return;
            try {
                const res = await apiFetch(`${API_BASE}/menu/${RESTAURANT_ID}`);
                fullMenu = await res.json();
                
                container.innerHTML = "";
                if(fullMenu.length === 0) container.innerHTML = "<p class='col-span-full text-slate-500'>Menú vacío.</p>";
                
                fullMenu.forEach(item => {
                    const stockLow = item.stock <= 10;
                    const stockColor = stockLow ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-700';
                    container.innerHTML += `
                        <button class="menu-item-btn relative bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center text-center hover:shadow-lg hover:-translate-y-1 transition-all group" data-name="${item.name}" onclick="addToCart('${item.id}')">
                            <span class="absolute top-2 right-2 text-xs font-bold px-2 py-0.5 rounded-full ${stockColor}">
                                ${item.stock || 0}
                            </span>
                            <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-amber-50 transition-colors">
                                <i data-lucide="utensils" class="w-6 h-6 text-slate-400 group-hover:text-amber-500"></i>
                            </div>
                            <strong class="font-semibold text-slate-900 text-sm mb-1 leading-tight h-10 overflow-hidden">${item.name}</strong>
                            <span class="text-amber-600 font-bold">${formatCOP(item.price)}</span>
                        </button>
                    `;
                });
                lucide.createIcons();
            } catch(e) {}
        };

        // Patch Cart Render
        window.renderCart = function() {
            const div = document.getElementById('cart-items');
            const subDiv = document.getElementById('cart-subtotal');
            const tipDiv = document.getElementById('cart-tip');
            const totalDiv = document.getElementById('cart-total');
            
            div.innerHTML = "";
            if(cart.length === 0) {
                div.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-slate-400 gap-3 opacity-50">
                        <i data-lucide="shopping-bag" class="w-12 h-12"></i>
                        <p>El carrito está vacío</p>
                    </div>
                `;
                lucide.createIcons();
                if(subDiv) subDiv.innerText = formatCOP(0);
                if(tipDiv) tipDiv.innerText = formatCOP(0);
                if(totalDiv) totalDiv.innerText = formatCOP(0);
                document.getElementById("btn-send").disabled = true;
                return;
            }
            
            document.getElementById("btn-send").disabled = false;
            currentSubtotal = 0;
            
            cart.forEach(item => {
                currentSubtotal += item.price * item.quantity;
                div.innerHTML += `
                    <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm relative group">
                        <div class="flex justify-between items-start mb-2 pr-6">
                            <div>
                                <span class="font-bold text-slate-900">${item.quantity}x</span>
                                <span class="font-semibold text-slate-700 text-sm ml-1">${item.name}</span>
                            </div>
                            <span class="font-bold text-slate-900 text-sm">${formatCOP(item.price * item.quantity)}</span>
                        </div>
                        <div class="flex gap-2">
                            <input type="text" placeholder="Notas (sin cebolla...)" class="flex-1 bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs outline-none focus:border-amber-500" onchange="updateCartNotes('${item.id}', this.value)" value="${item.notes}">
                        </div>
                        <button class="absolute top-2 right-2 text-slate-400 hover:text-red-500 p-1 bg-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-sm border border-slate-100" onclick="removeFromCart('${item.id}')">
                            <i data-lucide="x" class="w-3 h-3"></i>
                        </button>
                    </div>
                `;
            });
            lucide.createIcons();
            
            if(subDiv) subDiv.innerText = formatCOP(currentSubtotal);
            if(tipDiv) tipDiv.innerText = formatCOP(currentTip);
            if(totalDiv) totalDiv.innerText = formatCOP(currentSubtotal + currentTip);
        };

        // Override Modals
        window.openPaymentModal = function() {
            const mesa = document.getElementById("mesa").value;
            if(cart.length === 0 || !mesa) return showToast("Selecciona mesa y agrega productos");
            
            document.getElementById("payment-total-display").innerText = formatCOP(currentSubtotal + currentTip);
            document.getElementById("cash-received").value = "";
            document.getElementById("change-display").innerText = "$0";
            document.getElementById("payment-modal").classList.remove("hidden");
        };

        window.closePaymentModal = function() {
            document.getElementById("payment-modal").classList.add("hidden");
        };

        window.closeInvoice = function() {
            document.getElementById("invoice-modal").classList.add("hidden");
        };

        // Show Invoice intercept to use new classes
        const oldShowInvoice = window.showInvoice;
        window.showInvoice = function(order, subtotal, tip) {
            const modal = document.getElementById("invoice-modal");
            if(!modal) return;
            
            let html = `
                <div style="font-family:'Courier New', Courier, monospace; font-size: 0.85rem; line-height: 1.4; color: #000; padding: 20px; text-align: left; background: #fff;">
                    <div style="text-align:center; margin-bottom:15px;">
                        <h2 style="margin:0; font-size:1.1rem; text-transform:uppercase; font-weight:bold;">${localStorage.getItem("session_rest_name") || "TICKET"}</h2>
                        <div style="margin-top:4px;">Mesa: ${order.table_name}</div>
                        <div>Ord: #${order.id.substring(0,6)} | Mesero: ${order.waiter_name}</div>
                    </div>
                    <div style="border-bottom: 1px dashed #000; margin-bottom:10px;"></div>
            `;
            
            order.items.forEach(it => {
                html += `
                    <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                        <div style="flex:1;">${it.quantity}x ${it.item_name}</div>
                        <div>${formatCOP(it.quantity * it.price)}</div>
                    </div>
                `;
            });
            
            html += `
                    <div style="border-top: 1px dashed #000; margin-top:10px; padding-top:10px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                            <span>Subtotal:</span>
                            <span>${formatCOP(subtotal)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                            <span>Propina:</span>
                            <span>${formatCOP(tip)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-top:8px; font-weight:bold; font-size:1rem;">
                            <span>TOTAL:</span>
                            <span>${formatCOP(subtotal + tip)}</span>
                        </div>
                    </div>
                    <div style="text-align:center; margin-top:20px; font-size:0.75rem;">
                        ¡Gracias por su visita!
                    </div>
                </div>
            `;
            
            document.getElementById("invoice-content").innerHTML = html;
            modal.classList.remove("hidden");
        };

        document.addEventListener('DOMContentLoaded', () => {
            checkSession('mesero');
            addAdminBackButton();
            loadTablesGrid();
            loadMenuWaiter();
        });
    </script>
</body>
</html>
