<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | La Mesa Dorada</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f59e0b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            overflow-x: hidden;
        }

        .input-premium {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            background: #fff;
            transition: all 0.2s;
            outline: none;
        }

        .input-premium:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .btn-premium {
            background-color: #0f172a;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        .btn-premium:hover {
            background-color: #1e293b;
            transform: translateY(-1px);
        }

        .btn-premium:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Decorative Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-1/2 -left-1/2 w-full h-full bg-gradient-to-b from-amber-100 to-transparent rounded-full opacity-50 blur-3xl"></div>
    </div>

    <div class="w-full max-w-[450px] bg-white rounded-2xl shadow-2xl p-8 md:p-10 relative z-10">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i data-lucide="utensils-crossed" class="w-8 h-8 text-amber-500"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-900">La Mesa Dorada</h2>
            <p class="text-slate-500 text-sm mt-1">Acceso para Admin y Empleados</p>
        </div>

        <form id="loginForm" onsubmit="event.preventDefault(); doLogin();" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-1">Usuario</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-3 top-3 text-slate-400 w-5 h-5"></i>
                    <input type="text" id="user" name="username" placeholder="Tu usuario" class="input-premium pl-10" autocomplete="username" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Contraseña</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-3 top-3 text-slate-400 w-5 h-5"></i>
                    <input type="password" id="pwd" name="password" placeholder="••••••••" class="input-premium pl-10" autocomplete="current-password" required>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-slate-300 text-amber-500 focus:ring-amber-500 cursor-pointer">
                    <span class="text-sm text-slate-600 group-hover:text-slate-900 transition-colors">Mantener sesión</span>
                </label>
            </div>

            <div id="error-message" class="text-red-500 text-sm font-medium text-center hidden"></div>

            <button type="submit" id="btn-login" class="btn-premium bg-amber-500 hover:bg-amber-600 text-slate-900 mt-2">
                Ingresar <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <p class="text-sm text-slate-500">
                ¿No tienes un restaurante registrado? <br>
                <a href="register.html" class="text-amber-600 hover:text-amber-700 font-semibold transition-colors mt-1 inline-block">Crea tu cuenta aquí</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Auto-login si seleccionó "Mantener sesión"
        if(localStorage.getItem("session_role") && localStorage.getItem("session_token")) {
            const role = localStorage.getItem("session_role");
            if (role === 'mesero') window.location.href = 'mesero.html';
            else if (role === 'cocina') window.location.href = 'cocina.html';
            else if (role === 'admin') window.location.href = 'admin.html';
        }

        async function doLogin() {
            const user = document.getElementById('user').value;
            const pwd = document.getElementById('pwd').value;
            const remember = document.getElementById('rememberMe').checked;
            const errDiv = document.getElementById('error-message');
            const btn = document.getElementById('btn-login');

            if(!user || !pwd) return;
            
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-slate-900 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Ingresando...';
            errDiv.classList.add('hidden');

            const BACKEND_DOMAIN = "localhost:8000"; 
            const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:";
            const PROTOCOL_HTTP = isLocal ? "http://" : "https://";
            const API_BASE = `${PROTOCOL_HTTP}${BACKEND_DOMAIN}/api`;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({username: user, password: pwd})
                });
                
                const data = await res.json();
                
                if(data.success === false && data.needs_payment) {
                    localStorage.setItem("temp_pay_id", data.restaurant_id);
                    window.location.href = "subscription.html";
                    return;
                }

                if(res.ok && data.success) {
                    const storage = remember ? localStorage : sessionStorage;
                    
                    // Limpiar el otro storage por si acaso
                    (remember ? sessionStorage : localStorage).clear();

                    storage.setItem("session_rest_id", data.restaurant_id);
                    storage.setItem("session_rest_name", data.restaurant_name);
                    storage.setItem("session_role", data.role);
                    storage.setItem("session_user_name", data.user_name);
                    
                    // Guardar Token JWT!
                    storage.setItem("session_token", data.token);

                    if (data.role === 'mesero') window.location.href = 'mesero.html';
                    else if (data.role === 'cocina') window.location.href = 'cocina.html';
                    else if (data.role === 'admin') window.location.href = 'admin.html';
                } else {
                    errDiv.innerText = "Credenciales incorrectas";
                    errDiv.classList.remove('hidden');
                }
            } catch(e) { 
                errDiv.innerText = "Error de conexión con el servidor";
                errDiv.classList.remove('hidden');
            }
            
            btn.disabled = false;
            btn.innerHTML = 'Ingresar <i data-lucide="arrow-right" class="w-4 h-4"></i>';
            lucide.createIcons();
        }
    </script>
</body>
</html>
