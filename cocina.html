<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS - La Mesa Dorada</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f59e0b',
                        brand: 'var(--brand-color, #f59e0b)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Dark mode por defecto para KDS */
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }

        .btn-premium {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .btn-premium:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar oscura */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Toast overrides */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ffffff;
            color: #0f172a;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        #toast.show { transform: translateY(0); }

        /* Animación para nuevas órdenes */
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .order-card-new {
            animation: slideInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>
<body class="flex flex-col h-screen w-full">

    <header class="h-16 bg-slate-900 border-b border-slate-800 px-6 flex items-center justify-between shrink-0 shadow-md z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-amber-500 text-white flex items-center justify-center brand-bg">
                <i data-lucide="chef-hat" class="w-5 h-5"></i>
            </div>
            <h1 class="font-bold text-white text-xl tracking-tight">KITCHEN DISPLAY SYSTEM</h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 text-emerald-400 font-medium text-sm px-3 py-1 bg-emerald-400/10 rounded-full border border-emerald-400/20">
                <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                <span id="ws-status">En línea</span>
            </div>
            <span class="text-sm font-medium text-slate-300 bg-slate-800 px-3 py-1 rounded-full flex items-center gap-2 border border-slate-700">
                <i data-lucide="user" class="w-4 h-4"></i> <span id="lbl-user">Cocinero</span>
            </span>
            <button onclick="logout()" class="p-2 text-red-400 hover:bg-slate-800 rounded-full transition-colors" title="Salir">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-x-auto overflow-y-hidden p-6 bg-[#0f172a]">
        <div id="kitchen-orders" class="flex gap-6 h-full items-start snap-x pb-4">
            <!-- Las órdenes se inyectan aquí como columnas/cards -->
            <div class="flex flex-col items-center justify-center w-full h-full text-slate-600 gap-4 opacity-50">
                <i data-lucide="inbox" class="w-16 h-16"></i>
                <p class="text-xl font-medium">Sincronizando órdenes...</p>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">
        <i data-lucide="info" class="w-5 h-5 text-amber-500"></i> <span id="toast-msg"></span>
    </div>

    <!-- Script Injection -->
    <script>
        const originalShowToast = window.showToast;
    </script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();

        // Brand color
        const color = localStorage.getItem('temp_brand_color') || '#f59e0b';
        document.documentElement.style.setProperty('--brand-color', color);
        const brandBg = document.querySelector('.brand-bg');
        if(brandBg) brandBg.style.backgroundColor = color;

        document.getElementById('lbl-user').innerText = localStorage.getItem("session_user_name") || "Cocina";

        window.showToast = function(message) {
            const toast = document.getElementById("toast");
            const msg = document.getElementById("toast-msg");
            if (!toast) return;
            msg.innerText = message;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 3000);
        };

        // Tiempo transcurrido
        function updateTimes() {
            document.querySelectorAll('.order-time').forEach(el => {
                const startTime = new Date(el.getAttribute('data-time')).getTime();
                const now = new Date().getTime();
                const diff = Math.floor((now - startTime) / 60000); // en minutos
                
                let text = diff < 1 ? 'Justo ahora' : `Hace ${diff} min`;
                el.innerText = text;

                // Color según tiempo
                const parent = el.closest('.order-card-container');
                if(diff > 15 && parent) {
                    parent.classList.remove('border-slate-700');
                    parent.classList.add('border-red-500', 'shadow-[0_0_15px_rgba(239,68,68,0.2)]');
                    el.classList.add('text-red-400', 'font-bold');
                }
            });
        }
        setInterval(updateTimes, 60000); // Cada minuto

        // Patch Order Render
        window.renderOrderCard = function(order, container, isNew) {
            if(document.getElementById(`order-${order.id}`)) return;
            
            let itemsHtml = order.items.map(item => `
                <li class="py-3 border-b border-slate-700/50 last:border-0">
                    <div class="flex gap-3">
                        <span class="font-black text-xl text-amber-400 w-8 shrink-0">${item.quantity}x</span>
                        <div class="flex-1">
                            <span class="font-bold text-lg text-white leading-tight">${item.item_name}</span>
                            ${item.notes ? `<div class="mt-1 text-sm bg-red-500/10 border border-red-500/20 text-red-300 px-2 py-1 rounded inline-block"><span class="font-bold">NOTA:</span> ${item.notes}</div>` : ''}
                        </div>
                    </div>
                </li>
            `).join("");
            
            const orderCard = document.createElement('div');
            orderCard.className = `order-card-container shrink-0 w-80 md:w-[350px] bg-slate-800 border border-slate-700 rounded-xl flex flex-col h-full snap-start ${isNew ? 'order-card-new' : ''}`;
            orderCard.id = `order-${order.id}`;
            
            let isReady = order.status === 'ready';
            let headerBg = isReady ? 'bg-blue-600' : 'bg-slate-700';
            let statusText = isReady ? 'LISTA PARA ENTREGA' : 'NUEVA ORDEN';
            
            orderCard.innerHTML = `
                <div class="${headerBg} rounded-t-xl p-4 border-b border-slate-900 relative overflow-hidden">
                    ${isReady ? '<div class="absolute inset-0 bg-blue-500 opacity-20 bg-[url(\'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMSIvPgo8L3N2Zz4=\')]"></div>' : ''}
                    <div class="relative z-10 flex justify-between items-start mb-2">
                        <h3 class="font-black text-3xl text-white tracking-tight">${order.table_name}</h3>
                        <span class="text-[0.65rem] font-black tracking-wider px-2 py-1 bg-black/30 rounded text-white/90 uppercase">${statusText}</span>
                    </div>
                    <div class="relative z-10 flex justify-between items-center text-sm">
                        <span class="text-white/80 font-medium"><i data-lucide="user" class="w-3 h-3 inline mr-1"></i>${order.waiter_name}</span>
                        <span class="order-time font-semibold text-white/90" data-time="${order.created_at || new Date().toISOString()}">Calculando...</span>
                    </div>
                </div>
                
                <div class="flex-1 overflow-y-auto p-4 bg-slate-800">
                    <ul class="list-none m-0 p-0">${itemsHtml}</ul>
                </div>
                
                <div class="p-4 bg-slate-900 border-t border-slate-700 rounded-b-xl shrink-0">
                    ${!isReady 
                        ? `<button class="btn-premium w-full bg-emerald-500 hover:bg-emerald-600 text-slate-900 py-4 text-lg shadow-[0_0_15px_rgba(16,185,129,0.3)]" onclick="markOrderReady('${order.id}', this)">
                                <i data-lucide="check-circle" class="w-6 h-6"></i> Marcar Lista
                           </button>` 
                        : `<button class="btn-premium w-full bg-slate-700 hover:bg-slate-600 text-white" onclick="markOrderCompleted('${order.id}', this)">
                                Archivar (Entregada)
                           </button>`
                    }
                </div>
            `;
            
            container.prepend(orderCard);
            updateTimes();
            lucide.createIcons();
        };

        // Override InitKitchen para UX
        const oldInitKitchen = window.initKitchen;
        window.initKitchen = async function() {
            const ordersDiv = document.getElementById("kitchen-orders");
            if (!ordersDiv) return;

            try {
                const res = await apiFetch(`${API_BASE}/orders/${RESTAURANT_ID}`);
                const orders = await res.json();
                ordersDiv.innerHTML = "";
                if(orders.length === 0) {
                    ordersDiv.innerHTML = `
                        <div class="flex flex-col items-center justify-center w-full h-full text-slate-600 gap-4">
                            <i data-lucide="coffee" class="w-16 h-16 opacity-30"></i>
                            <p class="text-xl font-medium opacity-50">Esperando nuevas órdenes...</p>
                        </div>`;
                }
                else orders.reverse().forEach(o => renderOrderCard(o, ordersDiv, false));
                lucide.createIcons();
            } catch(e) { console.error("Error sincronizando", e); }

            ws = new WebSocket(`${WS_BASE}/${RESTAURANT_ID}`);
            ws.onopen = () => {
                showToast("KDS En línea");
                const st = document.getElementById('ws-status');
                if(st) { st.innerText = 'En línea'; st.classList.remove('text-red-400'); st.classList.add('text-emerald-400'); }
            };
            ws.onmessage = function(event) {
                const message = JSON.parse(event.data);
                if(message.type === "NEW_ORDER") {
                    if(ordersDiv.innerHTML.includes("Esperando nuevas")) ordersDiv.innerHTML = "";
                    renderOrderCard(message.data, ordersDiv, true);
                    
                    // Reproducir sonido
                    try {
                        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                        audio.volume = 0.5;
                        audio.play();
                    } catch(e) {}
                }
                else if (message.type === "ORDER_UPDATED") {
                    // Si se actualizó desde otro lado
                    const card = document.getElementById(`order-${message.data.order_id}`);
                    if(card && message.data.status === 'completed') {
                        card.style.animation = 'slideInUp 0.3s reverse forwards';
                        setTimeout(() => card.remove(), 300);
                        if(ordersDiv.children.length === 0) {
                            ordersDiv.innerHTML = `<div class="flex flex-col items-center justify-center w-full h-full text-slate-600 gap-4"><i data-lucide="coffee" class="w-16 h-16 opacity-30"></i><p class="text-xl font-medium opacity-50">Esperando nuevas órdenes...</p></div>`;
                            lucide.createIcons();
                        }
                    }
                }
            };
            ws.onclose = () => {
                showToast("Desconectado. Reintentando...");
                const st = document.getElementById('ws-status');
                if(st) { st.innerText = 'Offline'; st.classList.remove('text-emerald-400'); st.classList.add('text-red-400'); }
                setTimeout(initKitchen, 5000);
            };
        };

        // Sobrescribir markOrderCompleted para hacer la animación de salida
        const oldMarkOrderCompleted = window.markOrderCompleted;
        window.markOrderCompleted = async function(orderId, buttonElement) {
            buttonElement.innerText = "...";
            buttonElement.disabled = true;
            try {
                const response = await apiFetch(`${API_BASE}/orders/${orderId}/completed?restaurant_id=${RESTAURANT_ID}`, { method: "PUT" });
                if (response.ok) {
                    const card = document.getElementById(`order-${orderId}`);
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.9)';
                    card.style.transition = 'all 0.3s ease';
                    setTimeout(() => {
                        card.remove();
                        const ordersDiv = document.getElementById("kitchen-orders");
                        if(ordersDiv.children.length === 0) {
                            ordersDiv.innerHTML = `<div class="flex flex-col items-center justify-center w-full h-full text-slate-600 gap-4"><i data-lucide="coffee" class="w-16 h-16 opacity-30"></i><p class="text-xl font-medium opacity-50">Esperando nuevas órdenes...</p></div>`;
                            lucide.createIcons();
                        }
                    }, 300);
                }
            } catch (e) {
                alert("Error marcando orden como entregada");
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            checkSession('cocina');
            addAdminBackButton();
            initKitchen();
        });
    </script>
</body>
</html>
